
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.controls { display: flex; gap: 8px; flex-wrap: wrap; padding: 1rem 0 0; margin-bottom: 10px; align-items: center; }
select, input { font-size: 13px; padding: 5px 8px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-primary); color: var(--color-text-primary); height: 32px; }
.badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 6px; border-radius: 10px; white-space: nowrap; }
.ny  { background:#E6F1FB; color:#0C447C; }
.ca  { background:#E1F5EE; color:#085041; }
.pub { background:#F1EFE8; color:#444441; }
.prv { background:#EEEDFE; color:#3C3489; }
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; table-layout: fixed; }
th { text-align: left; font-size: 11px; font-weight: 500; color: var(--color-text-secondary); padding: 6px 6px; border-bottom: 0.5px solid var(--color-border-secondary); white-space: nowrap; cursor: pointer; user-select: none; }
th:hover { color: var(--color-text-primary); }
th.sorted { color: var(--color-text-primary); }
td { padding: 6px 6px; border-bottom: 0.5px solid var(--color-border-tertiary); color: var(--color-text-primary); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--color-background-secondary); }
.pct-bar { display: flex; align-items: center; gap: 5px; }
.bar-bg { flex: 1; height: 5px; background: var(--color-background-tertiary); border-radius: 3px; min-width: 30px; }
.bar-fill { height: 5px; border-radius: 3px; }
.pct-val { font-weight: 500; min-width: 34px; text-align: right; }
.rank-num { color: var(--color-text-secondary); font-weight: 500; }
.school-name { font-weight: 500; line-height: 1.3; }
.flag { font-size: 10px; color: var(--color-text-tertiary); }
.summary { font-size: 12px; color: var(--color-text-secondary); }
th:nth-child(1)  { width: 32px; }
th:nth-child(2)  { min-width: 155px; }
th:nth-child(3)  { width: 42px; }
th:nth-child(4)  { width: 48px; }
th:nth-child(5)  { width: 30px; }
th:nth-child(6)  { width: 30px; }
th:nth-child(7)  { width: 30px; }
th:nth-child(8)  { width: 42px; }
th:nth-child(9)  { width: 58px; }
th:nth-child(10) { width: 44px; }
th:nth-child(11) { width: 120px; }
</style>

<div class="controls">
  <select id="filterArea"><option value="">All areas</option><option value="NY">NY area</option><option value="CA">California</option></select>
  <select id="filterType"><option value="">Pub &amp; private</option><option value="Public">Public only</option><option value="Private">Private only</option></select>
  <input type="text" id="search" placeholder="Search school..." style="width:150px;">
  <span class="summary" id="summary"></span>
</div>

<div class="tbl-wrap">
<table id="tbl">
<thead><tr>
  <th onclick="s(0)">#</th>
  <th onclick="s(1)">School</th>
  <th onclick="s(2)">Area</th>
  <th onclick="s(3)">Type</th>
  <th onclick="s(4)" title="Harvard">H</th>
  <th onclick="s(5)" title="Princeton">P</th>
  <th onclick="s(6)" title="MIT">M</th>
  <th onclick="s(7)">4yr total</th>
  <th onclick="s(8)">Sr. class</th>
  <th onclick="s(9)">Avg/yr</th>
  <th onclick="s(10)">% of class</th>
</tr></thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
const raw = [
  ["Brearley School","NY","Private",18,9,1,28,63],
  ["Chapin School","NY","Private",8,7,0,15,40],
  ["Dalton School","NY","Private",23,11,3,37,105],
  ["Trinity School","NY","Private",23,12,2,37,121],
  ["Collegiate School","NY","Private",10,5,0,15,49],
  ["Spence School","NY","Private",9,4,1,14,58],
  ["Horace Mann School","NY","Private",25,10,6,41,179],
  ["Rye Country Day School","NY","Private",12,6,1,19,113],
  ["St. Ann's School","NY","Private",7,7,1,15,88],
  ["Hackley School","NY","Private",9,5,0,14,92],
  ["Riverdale Country School","NY","Private",8,5,1,14,100],
  ["Nightingale-Bamford","NY","Private",4,4,0,8,48],
  ["Regis High School","NY","Private",5,6,0,11,131],
  ["Ethical Culture Fieldston","NY","Private",3,7,0,10,95],
  ["SAR High School","NY","Private",1,7,2,10,159],
  ["Hunter College HS","NY","Public",20,17,13,50,190],
  ["Stuyvesant HS","NY","Public",37,28,42,107,800],
  ["Bronx Science","NY","Public",21,14,33,68,745],
  ["Townsend Harris HS","NY","Public",10,3,9,22,333],
  ["Scarsdale Senior HS","NY","Public",16,8,6,30,375],
  ["Manhasset Secondary","NY","Public",9,6,9,24,253],
  ["Staten Island Tech","NY","Public",1,2,14,17,351],
  ["Ward Melville Senior HS","NY","Public",7,8,5,20,600],
  ["LaGuardia HS","NY","Public",3,10,4,17,700],
  ["Brooklyn Tech","NY","Public",12,12,21,45,1425],
  ["SF University HS","CA","Private",6,3,1,10,109],
  ["Head-Royce School","CA","Private",3,3,3,9,113],
  ["St. Margaret's Episcopal","CA","Private",3,1,5,9,175],
  ["Francis W. Parker School","CA","Private",2,3,4,9,275],
  ["Archbishop Mitty HS","CA","Private",4,2,2,8,425],
  ["Santa Margarita Catholic HS","CA","Private",5,4,1,10,400],
  ["St. Francis HS (Mtn View)","CA","Private",6,1,2,9,400],
  ["Campolindo HS","CA","Public",5,2,1,8,225],
  ["La Cañada HS","CA","Public",4,3,2,9,300],
  ["Del Norte HS","CA","Public",3,3,3,9,231],
  ["Laguna Beach HS","CA","Public",1,6,2,9,350],
  ["Los Altos HS","CA","Public",2,2,5,9,450],
  ["North Hollywood Senior HS","CA","Public",3,2,4,9,500],
  ["Torrey Pines HS","CA","Public",0,1,8,9,661],
  ["Carlmont HS","CA","Public",1,2,5,8,475],
  ["Aragon HS","CA","Public",3,0,5,8,422],
  ["Cupertino HS","CA","Public",0,1,7,8,500],
  ["Thacher School","CA","Private",4,1,1,6,63],
  ["Branson School","CA","Private",5,2,0,7,105],
  ["La Jolla Country Day","CA","Private",2,2,2,6,75],
  ["Shalhevet HS","CA","Private",1,4,0,5,75],
  ["International HS (SF)","CA","Private",3,1,1,5,75],
  ["Loyola HS (LA)","CA","Private",3,2,1,6,291],
  ["Bellarmine College Prep","CA","Private",1,2,4,7,414],
  ["Valley Christian HS","CA","Private",0,1,5,6,375],
  ["Cathedral Catholic HS","CA","Private",1,2,1,4,550],
  ["Chadwick School","CA","Private",1,3,0,4,200],
  ["Lutheran HS Orange County","CA","Private",1,2,2,5,125],
  ["Laurel Springs School*","CA","Private",4,1,0,5,null],
];

const data = raw.map(r => {
  const cls = r[7];
  const pct = cls ? (r[6]/4)/cls*100 : null;
  return { name:r[0], area:r[1], type:r[2], h:r[3], p:r[4], m:r[5], total:r[6], cls, avgYr:r[6]/4, pct };
}).sort((a,b) => {
  if (a.pct === null && b.pct === null) return 0;
  if (a.pct === null) return 1;
  if (b.pct === null) return -1;
  return b.pct - a.pct;
}).map((r,i) => ({...r, rank: r.pct ? i+1 : '—'}));

let sortCol = 10, sortDir = -1;
function s(col) { sortCol === col ? sortDir *= -1 : (sortCol=col, sortDir=-1); render(); }

const maxPct = Math.max(...data.filter(d=>d.pct).map(d => d.pct));

const barColors = {
  "NY-Private": "#534AB7",
  "NY-Public":  "#888780",
  "CA-Private": "#0F6E56",
  "CA-Public":  "#1D9E75",
};

function render() {
  const area = document.getElementById('filterArea').value;
  const type = document.getElementById('filterType').value;
  const q = document.getElementById('search').value.toLowerCase();

  let rows = data.filter(d =>
    (!area || d.area === area) &&
    (!type || d.type === type) &&
    (!q || d.name.toLowerCase().includes(q))
  );

  const colFns = [
    d => typeof d.rank==='number'?d.rank:999,
    d => d.name, d => d.area, d => d.type,
    d => d.h, d => d.p, d => d.m, d => d.total,
    d => d.cls||0, d => d.avgYr, d => d.pct||0
  ];

  rows = [...rows].sort((a,b) => {
    const va = colFns[sortCol](a), vb = colFns[sortCol](b);
    if (typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (va - vb);
  });

  document.getElementById('summary').textContent = rows.length + ' schools';
  document.querySelectorAll('th').forEach((th,i) => th.classList.toggle('sorted', i===sortCol));

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = rows.map((d, i) => {
    const barW = d.pct ? Math.round(d.pct / maxPct * 100) : 0;
    const colorKey = d.area + '-' + d.type;
    const barColor = barColors[colorKey] || '#888780';
    const areaStyle = d.area === 'CA' ? 'background:#E1F5EE;color:#085041' : '';
    const areaBadge = `<span class="badge ny" style="${areaStyle}">${d.area}</span>`;
    const typeBadge = `<span class="badge ${d.type==='Public'?'pub':'prv'}">${d.type==='Public'?'pub':'priv'}</span>`;
    const pctDisplay = d.pct
      ? `<div class="pct-bar"><div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:${barColor}"></div></div><span class="pct-val">${d.pct.toFixed(1)}%</span></div>`
      : `<span style="color:var(--color-text-tertiary);font-size:11px;">online</span>`;
    const clsDisplay = d.cls ? `~${d.cls.toLocaleString()}` : `<span style="color:var(--color-text-tertiary)">—</span>`;
    const rankDisplay = typeof d.rank === 'number' ? i+1 : '—';
    return `<tr>
      <td class="rank-num">${rankDisplay}</td>
      <td class="school-name">${d.name}</td>
      <td>${areaBadge}</td>
      <td>${typeBadge}</td>
      <td>${d.h}</td><td>${d.p}</td><td>${d.m}</td>
      <td style="font-weight:500">${d.total}</td>
      <td style="color:var(--color-text-secondary);font-size:12px">${clsDisplay}</td>
      <td style="font-size:12px">${d.avgYr.toFixed(1)}</td>
      <td>${pctDisplay}</td>
    </tr>`;
  }).join('');
}

document.getElementById('filterArea').addEventListener('change', render);
document.getElementById('filterType').addEventListener('change', render);
document.getElementById('search').addEventListener('input', render);
render();
</script>
